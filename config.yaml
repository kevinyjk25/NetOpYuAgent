# ============================================================
# IT Ops Agent — Configuration
# ============================================================
# mode: mock | pragmatic
#
#   mock       — Simulated tools (built-in mock MCP + mock_tools.py).
#                Real LLM, real embeddings, real Redis memory.
#                Zero device credentials needed. Good for dev/demo.
#
#   pragmatic  — Real network device access via Netmiko/NAPALM/Nornir.
#                Real MCP servers from pragmatic_tools section.
#                Real LLM, real embeddings, real Redis memory (same as mock).
#
# Switch:  MODE=pragmatic uvicorn main:app --port 8001
# ============================================================

mode: "mock"         # mock | pragmatic   (env: MODE)


# ── Server ───────────────────────────────────────────────────
server:
  host:   "127.0.0.1"
  port:   8001
  reload: false
  a2a_base_url: "http://localhost:8001/api/v1/a2a"


# ── LLM Backend ──────────────────────────────────────────────
# Used by BOTH modes — always real.
llm:
  backend:     "ollama"
  model:       "qwen3.5:27b"
  base_url:    "http://localhost:11434"
  temperature: 0.1
  max_tokens:  4096
  log_detail:  "off"   # off | compact | full


# ── Embeddings ───────────────────────────────────────────────
# Used by BOTH modes — always real.
# Pull first: ollama pull nomic-embed-text
embeddings:
  backend:  "ollama"           # ollama | openai | none(stub)
  model:    "nomic-embed-text"
  base_url: "http://localhost:11434"
  dim:      768


# ── Tool Backends (mock mode) ─────────────────────────────────
tools:
  mcp:
    use_mock:    true
    config_json: ""
  openapi:
    use_mock:    true
    spec_url:    ""
    base_url:    ""
    auth_type:   "bearer"
    token_env:   "NETOPS_API_TOKEN"
  hitl_tool_names: ""


# ── Pragmatic mode — real network device access ───────────────
# Only used when mode: pragmatic.
#
# device_inventory: list of real devices Netmiko/NAPALM can connect to.
# Each device follows Netmiko's ConnectHandler parameter schema.
#
# mcp_servers: your own MCP server endpoints.
# These are loaded IN ADDITION to the pragmatic device tools.
#
pragmatic:
  # Real network devices — Netmiko ConnectHandler params
  # Leave empty list [] to skip real device connections.
  device_inventory:
    []
    # Example:
    # - id: "sw-core-01"
    #   device_type: "cisco_ios"    # netmiko device_type
    #   host: "192.168.1.1"
    #   username: "admin"
    #   password: "${SW_CORE_01_PASS}"   # env var substitution supported
    #   secret: "${SW_CORE_01_SECRET}"
    #   port: 22
    #   timeout: 30
    #   label: "Core Switch Site-A"
    #   tags: ["core", "site-a"]
    #
    # - id: "ap-01"
    #   device_type: "cisco_ios"
    #   host: "192.168.1.11"
    #   username: "admin"
    #   password: "${AP_01_PASS}"
    #   label: "AP Site-A Floor-1"
    #   tags: ["wireless", "site-a"]
    #
    # - id: "router-01"
    #   device_type: "cisco_xr"
    #   host: "192.168.1.254"
    #   username: "admin"
    #   password: "${ROUTER_01_PASS}"
    #   label: "Edge Router Site-A"
    #   tags: ["router", "edge"]

  # Additional real MCP servers (loaded alongside device tools)
  mcp_servers:
    []
    # Example:
    # - name: "netbox"
    #   transport: "http"
    #   url: "http://netbox.internal:8080"
    #   auth:
    #     type: "bearer"
    #     token_env: "NETBOX_MCP_TOKEN"
    # - name: "prometheus"
    #   transport: "stdio"
    #   command: ["python", "-m", "prometheus_mcp_server"]

  # NAPALM getter list for get_device_facts (pragmatic mode)
  napalm_getters:
    - "get_facts"
    - "get_interfaces"
    - "get_interfaces_ip"
    - "get_bgp_neighbors"
    - "get_ntp_servers"
    - "get_environment"


# ── HITL ─────────────────────────────────────────────────────
hitl:
  confidence_threshold:  0.75
  max_auto_host_count:   5
  skill_ambiguity:       false
  slack_webhook_url:     ""
  pagerduty_routing_key: ""
  sla:
    critical: 300
    high:     600
    medium:   900
    low:      1800
  destructive_action_types:
    - restart_service
    - rollback_deploy
    - delete_resource
    - drain_node
    - force_failover
    - flush_cache


# ── Memory ───────────────────────────────────────────────────
# Both modes use real Redis and real embeddings.
memory:
  data_dir:    "./data"
  redis_url:   ""          # e.g. "redis://localhost:6379" — leave blank for in-memory stub
  postgres_dsn: ""
  chroma_path: "./chroma_db"
  dtm:
    compaction_turns:         5    # flush daily .md after 5 turns (raise to 20+ in prod)
    nudge_turns:              5    # deep Hermes review every 5 turns
    track_b_weight:           1.5
    temporal_half_life_days:  7.0


# ── Skills ───────────────────────────────────────────────────
skills:
  top_k:               5
  ambiguity_threshold: 0.15


# ── Runtime ──────────────────────────────────────────────────
runtime:
  simple_confidence_floor:  0.70
  simple_max_tool_calls:    8    # raised: enough for small fleet checks
  tool_result_inline_limit: 4000
  stop:
    max_turns:             20   # raised: multi-device checks need up to 14+ turns
    max_tool_calls:        30   # raised: 7-device validation = 7+ tool calls
    token_budget:          50000
    max_no_progress_turns: 3
  pre_verification:  true
  post_verification: true
  model_tiering:     false


# ── Agent Registry ────────────────────────────────────────────
registry:
  agent_urls:            ""
  lb_strategy:           "round_robin"
  health_check_interval: 60


# ── Logging ───────────────────────────────────────────────────
logging:
  mode: "llm_only"   # normal | llm | verbose / llm_only
